windowrule = match:title ^(Open Folder)$, float on
windowrule = match:title ^(Open File)$, float on
windowrule = match:title ^(Save As)$, float on
windowrule = match:title ^(File Operation Progress)$, float on
windowrule = match:title ^(Firefox — Sharing Indicator)$, float on
windowrule = match:title ^(Extension: (Bitwarden - Free Password Manager) - — Mozilla Firefox)$, float on
windowrule = match:title ^(Extension: (Bitwarden - Free Password Manager) - — Mozilla Firefox)$, suppress_event fullscreen
windowrule = match:title ^(Extension: (Bitwarden - Free Password Manager) - Bitwarden — Mozilla Firefox)$, float on
windowrule = match:title ^(Extension: (Bitwarden - Free Password Manager) - Bitwarden — Mozilla Firefox)$, suppress_event fullscreen
windowrule = match:title ^(Extension: (Bitwarden Password Manager) - Bitwarden — Mozilla Firefox)$, float on
windowrule = match:title ^(Extension: (Bitwarden Password Manager) - Bitwarden — Mozilla Firefox)$, suppress_event fullscreen
# windowrule = suppressevent fullscreen,tile,class:^(libreoffice.*)$
windowrule = match:class ^(flameshot)$, float on
windowrule = match:class ^(Rofi)$, float on
windowrule = match:class ^(Rofi)$, no_anim on
windowrule = match:class ^(org.gnome.Calculator)$, float on
# opacity
windowrule = match:class [gG]nome-terminal*, opacity 0.85
windowrule = match:initial_class org.wezfurlong.wezterm, opacity 0.85
windowrule = match:class kitty, opacity 0.85
windowrule = match:initial_title ^(Spotify( Premium)?)$, opacity 0.90
windowrule = match:class [cC]ode, opacity 0.90
windowrule = match:class [cC]ode - Insiders, opacity 0.90
windowrule = match:initial_class dev.zed.Zed, opacity 0.90
windowrule = match:class code-url-handler, opacity 0.90
windowrule = match:class code-insiders-url-handler, opacity 0.90
windowrule = match:class [Tt]hunar, opacity 0.80
windowrule = match:class Dunst, opacity 0.70
windowrule = match:class discord, opacity 0.95

# nm connection editor
windowrule = match:class nm-connection-editor, float on
windowrule = match:class nm-openconnect-auth-dialog, float on

# protonvpn
windowrule = match:class protonvpn-app, float on
windowrule = match:class protonvpn-app, max_size 400 600

# flameshot workaround
windowrule = match:title ^(flameshot), move 0 0
windowrule = match:title ^(flameshot), suppress_event fullscreen

# steam 
windowrule = match:initial_class ^([Ss]team)$, float off
windowrule = match:initial_title ^(Friends List)$, min_size 320 600
windowrule = match:initial_title ^(Friends List)$, size 400 700
windowrule = match:initial_title ^(Friends List)$, float on

# Steam Tinker Launch
windowrule = match:class yad, float on

# jellyfin media player
windowrule = match:class ^(Jellyfin Media Player)$, idle_inhibit always

# thunar
windowrule = match:initial_title ^(Rename ".*)$ match:class ^([Tt]hunar)$, float on
windowrule = match:initial_title ^(Rename.*)$ match:class ^([Tt]hunar)$, size 600 118

# gimp color selection issues
windowrule = match:class gimp, suppress_event activatefocus


